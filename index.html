<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Điểm Danh - Instructor Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'attendance-system-poly';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.cloudDb = db;
        window.cloudAppId = appId;
        window.dbFuncs = { doc, setDoc, getDoc };

        const initCloud = async () => {
            try {
                await signInAnonymously(auth);
                console.log("Cloud Database: Connected");
            } catch (e) {
                console.error("Cloud Error:", e);
            }
        };
        initCloud();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            background-color: #f0f4f8;
            color: #1e293b;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .glass-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        @keyframes scanSuccess {
            0% { transform: scale(1); border-color: transparent; }
            50% { transform: scale(1.01); border-color: #10b981; }
            100% { transform: scale(1); border-color: transparent; }
        }
        .scan-anim { animation: scanSuccess 0.8s ease-out; border: 2px solid #10b981; }
    </style>
</head>
<body class="p-6">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8 px-2">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-[#f27024] rounded-2xl flex items-center justify-center shadow-lg shadow-orange-200">
                <span class="font-black text-white text-2xl italic">F</span>
            </div>
            <div>
                <h2 class="font-extrabold text-slate-800 tracking-tight leading-none text-lg">ATTENDANCE</h2>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">INSTRUCTOR PORTAL</span>
            </div>
        </div>
        <div id="clock" class="text-6xl font-bold text-[#0ea5e9] tracking-tighter">
            00:00:00
        </div>
    </div>

    <!-- Layout Chính -->
    <div class="grid grid-cols-12 gap-6">
        
        <!-- CỘT TRÁI -->
        <div class="col-span-12 lg:col-span-8 space-y-6">
            
            <!-- KHU VỰC HIỂN THỊ CHÍNH -->
            <div id="main-card" class="glass-card p-10 h-[420px] flex flex-col items-center justify-center relative transition-all duration-300">
                <div class="absolute top-8 left-10 flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-[11px] font-bold tracking-widest text-slate-400 uppercase">LIVE STREAM</span>
                </div>

                <div id="shift-badge" class="absolute top-8 right-10 px-4 py-1.5 rounded-full bg-slate-50 text-slate-400 text-[10px] font-bold border border-slate-100 uppercase">
                    CA 4
                </div>

                <div class="flex flex-col items-center">
                    <div class="mb-6 relative">
                        <div class="w-28 h-28 bg-[#f1f5f9] rounded-full flex items-center justify-center text-4xl shadow-inner">👤</div>
                    </div>
                    <h1 id="focus-name" class="text-5xl font-extrabold text-slate-800 mb-2 tracking-tighter">---</h1>
                    <p id="focus-mssv" class="text-2xl text-slate-400 font-semibold mb-8">Hệ thống sẵn sàng</p>
                    <div id="status-badge" class="px-10 py-2.5 rounded-full bg-slate-50 text-slate-500 border border-slate-100 font-bold text-xs uppercase tracking-widest">
                        ĐỢI QUÉT THẺ...
                    </div>
                </div>
            </div>

            <!-- BẢNG LỊCH SỬ -->
            <div class="glass-card p-10">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">LỊCH SỬ ĐIỂM DANH</h3>
                    <div class="flex items-center gap-4">
                        <button onclick="exportToExcel()" class="bg-[#10b981] text-white text-[10px] font-bold px-5 py-2 rounded-xl flex items-center gap-2 shadow-lg shadow-emerald-100 hover:scale-105 transition-transform">
                            <span>📄</span> XUẤT EXCEL
                        </button>
                        <button onclick="clearHistory()" class="text-[10px] text-slate-300 font-bold uppercase hover:text-rose-500 transition-colors">Xóa</button>
                    </div>
                </div>
                <div class="overflow-hidden">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-slate-400 text-[11px] font-bold uppercase text-left border-b border-slate-50">
                                <th class="pb-5">GIỜ</th>
                                <th class="pb-5">SINH VIÊN</th>
                                <th class="pb-5">MSSV</th>
                                <th class="pb-5 text-right">TT</th>
                            </tr>
                        </thead>
                        <tbody id="history-rows" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- SIDEBAR PHẢI -->
        <div class="col-span-12 lg:col-span-4 space-y-4">
            
            <!-- Nút đăng ký thẻ -->
            <button onclick="openRegistration('MANUAL')" class="w-full p-8 rounded-[2rem] bg-[#f27024] text-white shadow-xl shadow-orange-100 flex items-center justify-between group relative overflow-hidden active:scale-95 transition-transform">
                <div class="text-left relative z-10">
                    <p class="text-[10px] font-bold opacity-70 uppercase mb-1">CẤU HÌNH</p>
                    <h4 class="text-2xl font-extrabold uppercase tracking-tight">ĐĂNG KÝ THẺ MỚI</h4>
                </div>
                <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-3xl relative z-10">🪪</div>
            </button>

            <!-- Thống kê -->
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-8 rounded-[2rem] border-l-4 border-slate-300">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">SĨ SỐ</p>
                    <h4 id="stat-total" class="text-4xl font-extrabold text-slate-700">40</h4>
                </div>
                <div class="glass-card p-8 rounded-[2rem] border-l-4 border-[#10b981]">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">CÓ MẶT</p>
                    <h4 id="stat-present" class="text-4xl font-extrabold text-[#10b981]">0</h4>
                </div>
            </div>

            <div class="glass-card p-8 rounded-[2rem] border-l-4 border-[#f43f5e]">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">VẮNG</p>
                <h4 id="stat-absent" class="text-4xl font-extrabold text-[#f43f5e]">40</h4>
            </div>

            <!-- Thông tin ca học -->
            <div class="glass-card p-8 rounded-[2rem] space-y-6">
                <p class="text-[10px] font-bold text-slate-400 uppercase text-center tracking-widest">THÔNG TIN CA</p>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-5 rounded-3xl text-center">
                        <div class="text-[9px] font-bold text-slate-400 uppercase mb-2">VÀO</div>
                        <span id="shift-start" class="text-xl font-bold text-[#3b82f6]">14:00</span>
                    </div>
                    <div class="bg-slate-50 p-5 rounded-3xl text-center">
                        <div class="text-[9px] font-bold text-slate-400 uppercase mb-2">RA</div>
                        <span id="shift-end" class="text-xl font-bold text-[#3b82f6]">16:00</span>
                    </div>
                </div>
                <div class="pt-4 flex items-center justify-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">ESP32: ONLINE</span>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL ĐĂNG KÝ -->
    <div id="reg-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 hidden items-center justify-center p-6">
        <div class="bg-white max-w-sm w-full rounded-[3rem] p-10 shadow-2xl">
            <h2 class="text-3xl font-extrabold text-slate-800 mb-8 tracking-tight uppercase">Thẻ mới</h2>
            <div class="space-y-6">
                <div id="new-uid" class="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-[#f27024] font-mono font-bold text-lg text-center tracking-widest">---</div>
                <input type="text" id="reg-name" placeholder="Họ và tên" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 focus:outline-none focus:border-[#f27024] font-bold text-slate-700 text-sm">
                <input type="text" id="reg-mssv" placeholder="MSSV" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-100 focus:outline-none focus:border-[#f27024] font-bold text-slate-700 text-sm uppercase">
            </div>
            <div class="flex flex-col gap-3 mt-10">
                <button onclick="saveToCloud()" id="btn-save" class="bg-[#f27024] text-white font-extrabold py-4 rounded-2xl text-sm shadow-lg shadow-orange-100 active:scale-95 transition-transform">LƯU THÔNG TIN</button>
                <button onclick="closeModal()" class="text-slate-400 font-bold py-2 text-xs">HỦY</button>
            </div>
        </div>
    </div>

    <script>
        const TOKEN = ""; 
        const DEVICE_ID = ""; 

        const SHIFTS = [
            { id: 1, start: "07:15", end: "09:15" },
            { id: 2, start: "09:25", end: "11:15" },
            { id: 3, start: "12:00", end: "14:00" },
            { id: 4, start: "14:00", end: "16:00" },
            { id: 5, start: "16:00", end: "18:00" },
            { id: 6, start: "18:00", end: "20:00" }
        ];

        let attendanceHistory = [];
        let lastScannedUID = "";

        function updateClock() {
            const now = new Date();
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = now.toLocaleTimeString('vi-VN', { hour12: false });

            const nowMins = now.getHours() * 60 + now.getMinutes();
            const currentShift = SHIFTS.find(s => {
                const [sh, sm] = s.start.split(':').map(Number);
                const [eh, em] = s.end.split(':').map(Number);
                return nowMins >= (sh * 60 + sm) && nowMins < (eh * 60 + em);
            });

            const badge = document.getElementById('shift-badge');
            const startEl = document.getElementById('shift-start');
            const endEl = document.getElementById('shift-end');
            
            if (currentShift) {
                if(badge) badge.innerText = `CA ${currentShift.id}`;
                if(startEl) startEl.innerText = currentShift.start;
                if(endEl) endEl.innerText = currentShift.end;
            }
        }

        async function syncWithEra() {
            if (!TOKEN || !DEVICE_ID || !window.cloudDb) return;
            try {
                const res = await fetch(`https://backend.e-ra.io/api/v1/devices/${DEVICE_ID}/latest-data`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const data = await res.json();

                const rawUID = data.find(p => p.pin === "V2")?.value || "";
                const totalCount = data.find(p => p.pin === "V11")?.value || "40";
                const regCommandUID = data.find(p => p.pin === "V10")?.value || "0";

                document.getElementById('stat-total').innerText = totalCount;

                if (rawUID && rawUID !== "0" && rawUID !== lastScannedUID) {
                    lastScannedUID = rawUID;
                    const { doc, getDoc } = window.dbFuncs;
                    const studentDoc = await getDoc(doc(window.cloudDb, 'artifacts', window.cloudAppId, 'public', 'data', 'students', rawUID));
                    
                    if (studentDoc.exists()) {
                        const info = studentDoc.data();
                        onAttendanceSuccess(info.name, info.mssv);
                    } else {
                        onAttendanceSuccess("Thẻ chưa đăng ký", rawUID);
                    }
                }

                if (regCommandUID !== "0" && regCommandUID !== lastScannedUID) {
                    lastScannedUID = regCommandUID;
                    openRegistration(regCommandUID);
                }
            } catch (err) { console.error(err); }
        }

        function onAttendanceSuccess(name, mssv) {
            document.getElementById('focus-name').innerText = name;
            document.getElementById('focus-mssv').innerText = mssv;
            document.getElementById('status-badge').innerText = name === "Thẻ chưa đăng ký" ? "PENDING..." : "SUCCESSFUL";
            
            const card = document.getElementById('main-card');
            card.classList.add('scan-anim');
            setTimeout(() => card.classList.remove('scan-anim'), 1000);

            if (name !== "Thẻ chưa đăng ký") {
                const time = new Date().toLocaleTimeString('vi-VN', { hour12: false });
                attendanceHistory.unshift({ "GIỜ": time, "SINH VIÊN": name, "MSSV": mssv, "TT": "Có mặt" });
                renderHistory();
                
                const presentCount = attendanceHistory.length;
                document.getElementById('stat-present').innerText = presentCount;
                document.getElementById('stat-absent').innerText = Math.max(0, parseInt(document.getElementById('stat-total').innerText) - presentCount);
            }
        }

        function renderHistory() {
            const tbody = document.getElementById('history-rows');
            tbody.innerHTML = attendanceHistory.map(item => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="py-5 text-sky-600 font-bold font-mono">${item["GIỜ"]}</td>
                    <td class="py-5 font-bold text-slate-700 uppercase">${item["SINH VIÊN"]}</td>
                    <td class="py-5 text-slate-400 font-medium">${item["MSSV"]}</td>
                    <td class="py-5 text-right"><span class="bg-emerald-50 text-emerald-600 text-[10px] px-3 py-1 rounded-full font-bold border border-emerald-100 uppercase">OK</span></td>
                </tr>
            `).join('');
        }

        async function saveToCloud() {
            const name = document.getElementById('reg-name').value;
            const mssv = document.getElementById('reg-mssv').value;
            const uid = document.getElementById('new-uid').innerText;

            if (!name || !mssv || uid === "---") return alert("Hãy nhập đủ thông tin!");
            const btn = document.getElementById('btn-save');
            btn.innerText = "ĐANG LƯU...";
            btn.disabled = true;

            try {
                const { doc, setDoc } = window.dbFuncs;
                await setDoc(doc(window.cloudDb, 'artifacts', window.cloudAppId, 'public', 'data', 'students', uid), {
                    uid, name, mssv, timestamp: new Date().toISOString()
                });
                alert(`Lưu thành công: ${name}`);
                closeModal();
            } catch (e) {
                alert("Lỗi Cloud!");
            } finally {
                btn.innerText = "LƯU THÔNG TIN";
                btn.disabled = false;
                lastScannedUID = "";
            }
        }

        function exportToExcel() {
            if (attendanceHistory.length === 0) return alert("Không có dữ liệu!");
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(attendanceHistory);
            XLSX.utils.book_append_sheet(wb, ws, "Attendance");
            XLSX.writeFile(wb, `BaoCao_DiemDanh.xlsx`);
        }

        function openRegistration(uid) {
            document.getElementById('new-uid').innerText = uid;
            document.getElementById('reg-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('reg-modal').style.display = 'none';
        }

        function clearHistory() {
            if(confirm("Xóa lịch sử?")) {
                attendanceHistory = [];
                renderHistory();
                document.getElementById('stat-present').innerText = "0";
            }
        }

        setInterval(updateClock, 1000);
        setInterval(syncWithEra, 2000);
    </script>
</body>
</html>
